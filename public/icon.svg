<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7BA3AD"/>
      <stop offset="1" stop-color="#5F8E9A"/>
    </linearGradient>
  </defs>
  <!-- Rounded tile -->
  <rect width="512" height="512" rx="112" fill="url(#tile)"/>
  <!-- Kairos compass needle, leaning to catch the moment -->
  <g transform="rotate(24 256 256)">
    <polygon points="256,82 205,256 307,256" fill="#F8F6F2"/>
    <polygon points="256,430 205,256 307,256" fill="#F8F6F2" opacity="0.5"/>
    <circle cx="256" cy="256" r="30" fill="#F8F6F2"/>
    <circle cx="256" cy="256" r="13" fill="#5B8A96"/>
  </g>
</svg>
